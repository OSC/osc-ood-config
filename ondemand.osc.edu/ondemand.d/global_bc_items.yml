global_bc_form_items:
  global_job_type:
    label: "Job type"
    widget: select
    options:
    - - "CPU"
      - cpu-batch
      - data-hide-auto-modules-cuda: true
      - data-set-auto-modules-cuda: ''
      - data-set-global-enable-mem: 0
      - data-hide-global-mem: true
      - data-hide-global-gpu-type: true
      - data-hide-global-gpus: true
      - data-set-bc-num-nodes: 1
      - data-min-bc-num-nodes: 1
      - data-max-bc-num-nodes-for-cluster-cardinal: 12
      - data-max-bc-num-nodes-for-cluster-ascend: 16
      - data-max-bc-num-nodes-for-cluster-pitzer: 36
      - data-set-global-num-cores: 1
      - data-min-global-num-cores: 1
      - data-max-global-num-cores-for-cluster-cardinal: 96
      - data-max-global-num-cores-for-cluster-ascend: 118
      - data-max-global-num-cores-for-cluster-pitzer: 48
      - data-set-global-gpus: 0
      - data-min-global-gpus: 0
      - data-set-global-mem: 4
      - data-min-global-mem: 4
      - data-max-global-mem-for-cluster-cardinal: 1860   # hugemem
      - data-max-global-mem-for-cluster-ascend: 921      # quad
      - data-max-global-mem-for-cluster-pitzer: 2988     # hugemem
    - - "GPU"
      - gpu-batch
      - data-hide-auto-modules-cuda: false
      - data-set-global-enable-mem: 0
      - data-hide-global-mem: true
      - data-hide-global-gpu-type: false
      - data-hide-global-gpus: false
